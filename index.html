<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İrem & Kaan Davetiye</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="davetiye-konteyner">
        
        <div class="figur-konteyner" id="gelin-konteyner">
            <div class="figur-ic">
                </div>
        </div>

        <div class="kart">
            
            <div class="siyah-bolum">
                <div class="kemer-konteyner">
                    <div class="tarih-kemer">
                        <span class="sayi-belirgin">31</span>
                        <span class="sayi-belirgin">08</span>
                        <span class="sayi-belirgin">25</span>
                    </div>
                </div>
            </div>

            <div class="krem-bolum">
                <header class="davetiye-baslik">
                    <p class="save-the-date">Save the Date</p>
                    <p class="ust-yazi">MUTLULUĞUMUZA DAVETLİSİNİZ</p>
                </header>

                <div class="isimler">
                    <h1 class="isim">İREM</h1>
                    <span class="ve">&</span>
                    <h1 class="isim">KAAN</h1>
                </div>

                <div class="detaylar">
                    <p class="tarih-detay">31 AĞUSTOS 2025 PAZAR</p>
                    <p class="saat-detay">SAAT 19:00</p>
                    <p class="kokteyl-detay">Kokteyl 18.30'da Başlayacaktır.</p>
                </div>

                <div class="mekan">
                    <p class="mekan-adi">KALENDER ORDUEVİ BOĞAZTEPE TESİSİ</p>
                    <p class="mekan-adres">Yeniköy Mah. Köybaşı Cad. Sarıyer/İstanbul</p>
                    <p class="cocuk-uyari">(Çocuklara İyi Uykular Dileriz ✨)</p>
                </div>
            </div>

        </div>

        <div class="figur-konteyner" id="damat-konteyner">
            <div class="figur-ic">
                </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
